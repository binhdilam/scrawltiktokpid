<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TikTok PID Extractor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f7fb;
    --surface: #ffffff;
    --text: #102033;
    --muted: #65708a;
    --line: #d9dfeb;
    --primary: #0c67f3;
    --primary-h: #0a55d0;
    --primary-soft: #e7f0ff;
    --green: #16a34a;
    --green-bg: #f0fdf4;
    --red: #dc2626;
    --red-bg: #fef2f2;
    --warn: #d97706;
    --warn-bg: #fffbeb;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(140deg, #f4f7fb 0%, #f8fbff 52%, #ffffff 100%);
    color: var(--text);
    font-size: 13px;
    min-height: 100vh;
    line-height: 1.5;
  }

  .app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--line);
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(6px);
    position: sticky; top: 0; z-index: 10;
  }

  .logo { display: flex; align-items: center; gap: 10px; }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #102033, #185cff);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-name {
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    background: linear-gradient(135deg, #102033, #185cff);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .badge {
    font-size: 10px; padding: 2px 8px; border-radius: 20px;
    background: var(--primary-soft); color: var(--primary); font-weight: 600;
  }

  /* ── Main ── */
  main { padding: 14px 18px 24px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* ── Input ── */
  .input-card { padding: 14px; }
  .input-label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 7px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.4px; }

  textarea {
    width: 100%; height: 110px; resize: vertical;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 9px 11px;
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px; color: var(--text); outline: none;
    min-height: 64px; transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--primary); }
  textarea::placeholder { color: #a8b3c5; }

  .input-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .count-label { font-size: 11px; color: var(--muted); }

  .btn-run {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, #102033, #185cff);
    color: white; border: none; border-radius: var(--radius-sm);
    padding: 8px 20px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s;
    letter-spacing: -0.1px;
  }
  .btn-run:hover { opacity: 0.88; }
  .btn-run:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Metrics ── */
  .metrics { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }

  .metric {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 12px 14px;
  }
  .metric-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px; font-weight: 500; }
  .metric-value { font-size: 24px; font-weight: 700; color: var(--text); }
  .metric-value.green { color: var(--green); }
  .metric-value.red   { color: var(--red); }

  /* ── Results ── */
  .result-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--line);
    background: #fafbfd;
  }

  .result-title { font-size: 12px; font-weight: 600; color: var(--text); display: flex; align-items: center; gap: 8px; }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--line); border-top-color: var(--primary);
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-export {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; padding: 5px 12px; border-radius: var(--radius-sm);
    background: var(--primary-soft); border: 1px solid #c5d9fc;
    color: var(--primary); cursor: pointer; font-weight: 600;
    transition: background 0.15s;
  }
  .btn-export:hover { background: #d6e7ff; }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }

  .progress-bar-wrap { height: 3px; background: var(--line); display: none; }
  .progress-bar-wrap.active { display: block; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #0c67f3, #185cff); transition: width 0.3s ease; width: 0%; }

  .table-wrap { overflow-x: auto; max-height: 320px; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead tr { background: #fafbfd; position: sticky; top: 0; z-index: 1; }
  th {
    text-align: left; padding: 8px 12px;
    font-weight: 600; font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap;
    border-bottom: 1px solid var(--line);
  }
  td { padding: 9px 12px; border-top: 1px solid #f0f2f7; vertical-align: middle; }

  .cell-author { max-width: 160px; }
  .author { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .desc { font-size: 11px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

  .mono { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: var(--muted); }

  .pid-cell { display: flex; align-items: center; gap: 5px; }
  .pid-val { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: var(--primary); font-weight: 600; }

  .btn-copy {
    background: none; border: none; cursor: pointer;
    color: #c5ccd8; padding: 2px 4px; border-radius: 4px;
    display: flex; align-items: center; transition: color 0.1s, background 0.1s;
  }
  .btn-copy:hover { color: var(--primary); background: var(--primary-soft); }

  .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .status-ok         { background: var(--green-bg); color: var(--green); }
  .status-error      { background: var(--red-bg); color: var(--red); }
  .status-warn       { background: var(--warn-bg); color: var(--warn); }
  .status-processing { background: var(--primary-soft); color: var(--primary); }

  .link-btn { color: #c5ccd8; display: flex; align-items: center; text-decoration: none; transition: color 0.1s; }
  .link-btn:hover { color: var(--primary); }

  .empty-state { padding: 40px 12px; text-align: center; color: var(--muted); font-size: 12px; }
  .empty-icon  { margin-bottom: 10px; opacity: 0.25; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.05a8.17 8.17 0 0 0 4.78 1.52V7.13a4.85 4.85 0 0 1-1.01-.44z"/></svg>
      </div>
      <span class="logo-name">TikTok PID Extractor</span>
    </div>
    <span class="badge">v2.1</span>
  </header>

  <main>
    <!-- Input -->
    <div class="card input-card">
      <label class="input-label" for="input-area">Video ID hoặc link TikTok — mỗi dòng 1 video</label>
      <textarea id="input-area" placeholder="7591500512403508487&#10;https://www.tiktok.com/@user/video/7555844889297079560&#10;7617058362840157461"></textarea>
      <div class="input-footer">
        <span class="count-label" id="count-label">0 video</span>
        <button class="btn-run" id="btn-run">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          Lấy PID
        </button>
      </div>
    </div>

    <!-- Metrics -->
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Đã xử lý</div>
        <div class="metric-value" id="m-total">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Có PID</div>
        <div class="metric-value green" id="m-ok">—</div>
      </div>
      <div class="metric">
        <div class="metric-label">Không có</div>
        <div class="metric-value red" id="m-err">—</div>
      </div>
    </div>

    <!-- Results -->
    <div class="card">
      <div class="result-header">
        <div class="result-title">
          <div class="spinner" id="spinner"></div>
          Kết quả
        </div>
        <button class="btn-export" id="btn-export" disabled>
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export XLSX
        </button>
      </div>
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="table-wrap">
        <table>
          <colgroup>
            <col style="width:160px"><col style="width:135px"><col style="width:140px"><col style="width:85px"><col style="width:32px">
          </colgroup>
          <thead>
            <tr>
              <th>Tác giả / Mô tả</th>
              <th>Video ID</th>
              <th>Product ID</th>
              <th>Trạng thái</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="5">
              <div class="empty-state">
                <div class="empty-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
                Chưa có kết quả — nhập video ID và bấm Lấy PID
              </div>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>
<script src="xlsx.mini.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
