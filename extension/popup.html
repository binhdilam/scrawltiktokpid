<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>TikTok PID Extractor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f4;
    color: #1a1a1a;
    width: 580px;
    min-height: 400px;
    font-size: 13px;
  }

  .shell { padding: 16px; }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .logo { display: flex; align-items: center; gap: 8px; }

  .logo-icon {
    width: 28px; height: 28px;
    background: #FE2C55;
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .logo-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }

  .badge {
    font-size: 10px; padding: 2px 8px;
    border-radius: 20px;
    background: #e7e5e4;
    color: #78716c;
  }

  .card {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    margin-bottom: 10px;
  }

  .input-card { padding: 12px; }

  .input-label {
    font-size: 11px; color: #6b7280;
    display: block; margin-bottom: 6px;
  }

  textarea {
    width: 100%; height: 100px;
    resize: vertical;
    background: #f5f5f4;
    border: 0.5px solid rgba(0,0,0,0.15);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 11.5px;
    color: #1a1a1a;
    outline: none;
    min-height: 60px;
  }

  textarea:focus { border-color: #FE2C55; }
  textarea::placeholder { color: #a8a29e; }

  .input-footer {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .count-label { font-size: 11px; color: #a8a29e; }

  .btn-run {
    display: flex; align-items: center; gap: 5px;
    background: #FE2C55; color: white;
    border: none; border-radius: 6px;
    padding: 7px 16px;
    font-size: 12.5px; font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, opacity 0.15s;
  }

  .btn-run:hover { background: #e0193f; }
  .btn-run:disabled { opacity: 0.45; cursor: not-allowed; }

  .metrics {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin-bottom: 10px;
  }

  .metric {
    background: #fff;
    border: 0.5px solid rgba(0,0,0,0.1);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .metric-label {
    font-size: 10px; color: #9ca3af;
    text-transform: uppercase; letter-spacing: 0.4px;
    margin-bottom: 4px;
  }

  .metric-value { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .metric-value.green { color: #16a34a; }
  .metric-value.red { color: #dc2626; }

  .result-header {
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 9px 12px;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
  }

  .result-title {
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 7px;
  }

  .spinner {
    width: 12px; height: 12px;
    border: 2px solid rgba(0,0,0,0.1);
    border-top-color: #FE2C55;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .spinner.active { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-export {
    display: flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 4px 10px;
    border-radius: 6px;
    background: transparent;
    border: 0.5px solid rgba(0,0,0,0.15);
    color: #374151; cursor: pointer;
    transition: background 0.15s;
  }

  .btn-export:hover { background: #f5f5f4; }
  .btn-export:disabled { opacity: 0.4; cursor: not-allowed; }

  .table-wrap { overflow-x: auto; max-height: 280px; overflow-y: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 11.5px; }

  thead tr { background: #f9f9f8; position: sticky; top: 0; z-index: 1; }

  th {
    text-align: left; padding: 7px 10px;
    font-weight: 500; font-size: 10px; color: #9ca3af;
    text-transform: uppercase; letter-spacing: 0.4px;
    white-space: nowrap;
    border-bottom: 0.5px solid rgba(0,0,0,0.08);
  }

  td { padding: 8px 10px; border-top: 0.5px solid rgba(0,0,0,0.06); vertical-align: middle; }

  .cell-author { max-width: 150px; }
  .author { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .desc { font-size: 10px; color: #9ca3af; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }

  .mono { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10.5px; color: #6b7280; }

  .pid-cell { display: flex; align-items: center; gap: 4px; }
  .pid-val { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10.5px; color: #2563eb; }

  .btn-copy {
    background: none; border: none; cursor: pointer;
    color: #d1d5db; padding: 2px 3px; border-radius: 3px;
    display: flex; align-items: center;
    transition: color 0.1s, background 0.1s;
  }
  .btn-copy:hover { color: #374151; background: #f3f4f6; }

  .status-badge {
    font-size: 10px; padding: 2px 7px;
    border-radius: 20px; font-weight: 500; white-space: nowrap;
  }

  .status-ok { background: #f0fdf4; color: #16a34a; }
  .status-error { background: #fef2f2; color: #dc2626; }
  .status-warn { background: #fffbeb; color: #d97706; }
  .status-processing { background: #f3f4f6; color: #9ca3af; }

  .link-btn { color: #d1d5db; display: flex; align-items: center; text-decoration: none; transition: color 0.1s; }
  .link-btn:hover { color: #374151; }

  .empty-state {
    padding: 36px 12px; text-align: center;
    color: #9ca3af; font-size: 12px;
  }

  .empty-icon { margin-bottom: 8px; opacity: 0.25; }

  .progress-bar-wrap {
    height: 2px; background: rgba(0,0,0,0.06);
    display: none;
  }
  .progress-bar-wrap.active { display: block; }
  .progress-bar {
    height: 100%; background: #FE2C55;
    transition: width 0.3s ease;
    width: 0%;
  }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V9.05a8.17 8.17 0 0 0 4.78 1.52V7.13a4.85 4.85 0 0 1-1.01-.44z"/></svg>
      </div>
      <span class="logo-name">TikTok PID Extractor</span>
    </div>
    <span class="badge">v2.0</span>
  </header>

  <div class="card input-card">
    <label class="input-label" for="input-area">Dán video ID hoặc link TikTok — mỗi dòng 1 video</label>
    <textarea id="input-area" placeholder="7591500512403508487&#10;https://www.tiktok.com/@user/video/7555844889297079560&#10;7617058362840157461"></textarea>
    <div class="input-footer">
      <span class="count-label" id="count-label">0 video</span>
      <button class="btn-run" id="btn-run">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        Lấy PID
      </button>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Đã xử lý</div>
      <div class="metric-value" id="m-total">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Có PID</div>
      <div class="metric-value green" id="m-ok">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Không có</div>
      <div class="metric-value red" id="m-err">—</div>
    </div>
  </div>

  <div class="card">
    <div class="result-header">
      <div class="result-title">
        <div class="spinner" id="spinner"></div>
        Kết quả
      </div>
      <button class="btn-export" id="btn-export" disabled>
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="table-wrap">
      <table>
        <colgroup>
          <col style="width:150px">
          <col style="width:130px">
          <col style="width:130px">
          <col style="width:80px">
          <col style="width:32px">
        </colgroup>
        <thead>
          <tr>
            <th>Tác giả / Mô tả</th>
            <th>Video ID</th>
            <th>Product ID</th>
            <th>Trạng thái</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5">
            <div class="empty-state">
              <div class="empty-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              </div>
              Chưa có kết quả — nhập video ID và bấm Lấy PID
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
